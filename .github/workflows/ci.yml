name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          version: "0.9.10"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev --group dev

      - name: Run tests
        run: uv run python -m pytest -q --tb=no

      - name: Smoke test CLI
        run: uv run defuddle "${{ github.workspace }}/tests/fixtures/general--www.figma.com-blog-introducing-codex-to-figma.html" --json > /tmp/defuddle.json
